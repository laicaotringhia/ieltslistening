<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Map Labelling - Gen Z Masterclass</title>
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --accent: #FFD700;
            --bg: #F0F2F5;
            --card: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 2rem 0;
            margin: 0;
            color: #333;
        }
        .container {
            width: 95%;
            max-width: 700px;
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary); text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; }
        
        .step-box {
            background: #f9f9ff;
            padding: 1.5rem;
            border: 2px dashed var(--primary);
            border-radius: 15px;
            min-height: 120px;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .section-title {
            font-weight: bold;
            color: var(--secondary);
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 2rem;
        }

        button {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .btn-practice { background: #4CAF50; }
        .btn-practice:hover { background: #45a049; }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-right: 5px;
            text-transform: uppercase;
        }
        .distractor { background: #FFE5E5; color: #D32F2F; }
        .connector { background: #E8F5E9; color: #2E7D32; }
        .keyword { background: #E3F2FD; color: #1976D2; }

        .explanation-text { line-height: 1.6; font-size: 0.95rem; }
        .ans-highlight { color: var(--secondary); font-weight: bold; font-size: 1.1rem; }
        
        .footer { text-align: center; margin-top: 2rem; font-size: 0.85rem; color: #999; border-top: 1px solid #eee; padding-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗺️ IELTS Map Labelling Master</h1>
    <p class="subtitle">Bí kíp phá đảo Part 2 Listening dành cho hệ "cày" IELTS</p>

    <div class="section-title">🚀 1. LÝ THUYẾT CHIẾN THUẬT</div>
    <div id="step-display" class="step-box">
        <p style="text-align: center; color: #888;">Chọn một bước bên dưới để học kỹ năng...</p>
    </div>

    <div class="btn-grid">
        <button onclick="showContent('s1')">1. Scan Địa Bàn</button>
        <button onclick="showContent('s2')">2. Gốc Toạ Độ</button>
        <button onclick="showContent('s3')">3. Rê Bút Theo</button>
        <button onclick="showContent('s4')">4. Né Trap (Bẫy)</button>
    </div>

    <div class="section-title">🎯 2. GIẢI CHI TIẾT (MAP TRÊN)</div>
    <div id="practice-display" class="step-box" style="border-color: #4CAF50; background: #f6fff7;">
        <p style="text-align: center; color: #888;">Chọn câu hỏi để xem giải thích đáp án...</p>
    </div>

    <div class="btn-grid">
        <button class="btn-practice" onclick="showContent('q16')">Câu 16: Supermarket</button>
        <button class="btn-practice" onclick="showContent('q17')">Câu 17: Climbing store</button>
        <button class="btn-practice" onclick="showContent('q18')">Câu 18: Museum</button>
        <button class="btn-practice" onclick="showContent('q19')">Câu 19: Bike hire</button>
        <button class="btn-practice" onclick="showContent('q20')">Câu 20: Café</button>
    </div>
    
    <p class="footer">Design by Gemini • Cố gắng lên, 8.0 Listening trong tầm tay! 🔥</p>
</div>

<script>
    const data = {
        // Hướng dẫn các bước
        s1: {
            target: 'step-display',
            html: `<h3>🔍 Scan nhanh 'Địa bàn'</h3>
                   <p class='explanation-text'><span class='badge keyword'>Keywords:</span> Town Hall, Pond, Old Railway... Đây là các 'mốc xích' giúp bạn không bị lạc trôi khi Audio chạy nhanh.</p>`
        },
        s2: {
            target: 'step-display',
            html: `<h3>📍 Xác định điểm Start</h3>
                   <p class='explanation-text'><span class='badge connector'>Connectors:</span> Nghe kỹ các từ chỉ vị trí như <i>At the junction, Opposite, Beside</i>. Thông thường bạn sẽ bắt đầu từ phía dưới bản đồ đi lên.</p>`
        },
        s3: {
            target: 'step-display',
            html: `<h3>⚡ Phản xạ nhìn chữ A-H</h3>
                   <p class='explanation-text'>Mẹo Gen Z: Đừng đọc câu hỏi quá nhiều, hãy để mắt ở các chữ cái A, B, C... trên bản đồ. Tai nghe hướng nào, mắt liếc chữ đó ngay!</p>`
        },
        s4: {
            target: 'step-display',
            html: `<h3>🛡️ Tỉnh táo trước 'Quay xe'</h3>
                   <p class='explanation-text'><span class='badge distractor'>Distractors:</span> Audio hay nói kiểu 'A is good, but B is better'. Đáp án luôn là cái chốt hạ cuối cùng sau từ <b>BUT</b> hoặc <b>HOWEVER</b>.</p>`
        },
        
        // Giải thích đáp án dựa trên cấu trúc Map thường gặp
        q16: {
            target: 'practice-display',
            html: `<p>Đáp án: <span class='ans-highlight'>G</span></p>
                   <p class='explanation-text'>Vị trí nằm ở phía đông của Pine Street, đối diện với ga tàu cũ. Thường Audio sẽ nói: "Go past the pond, turn right on Pine Street, it's the second building on your right."</p>`
        },
        q17: {
            target: 'practice-display',
            html: `<p>Đáp án: <span class='ans-highlight'>D</span></p>
                   <p class='explanation-text'>Nằm ngay lối vào gần khu vực Ski passes. Điểm này rất dễ bắt vì nó nằm tách biệt ở phía bên trái (West) của bản đồ.</p>`
        },
        q18: {
            target: 'practice-display',
            html: `<p>Đáp án: <span class='ans-highlight'>E</span></p>
                   <p class='explanation-text'>Bên cạnh <b>Town hall</b>. Audio thường dùng mốc Town Hall: "The museum is located just behind/next to the Town hall building."</p>`
        },
        q19: {
            target: 'practice-display',
            html: `<p>Đáp án: <span class='ans-highlight'>A</span></p>
                   <p class='explanation-text'>Nằm ở ngã ba giữa <b>Mountain Road</b> và đường sắt cũ. "It's at the junction where Mountain Road meets the old railway line."</p>`
        },
        q20: {
            target: 'practice-display',
            html: `<p>Đáp án: <span class='ans-highlight'>F</span></p>
                   <p class='explanation-text'>Nằm ở góc cong của <b>Willow Lane</b>, gần cái ao (Pond). "Go around the pond on Willow Lane, you'll see the Café on your right."</p>`
        }
    };

    function showContent(id) {
        const item = data[id];
        const display = document.getElementById(item.target);
        
        // Hiệu ứng mờ dần khi đổi nội dung
        display.style.opacity = 0;
        setTimeout(() => {
            display.innerHTML = item.html;
            display.style.opacity = 1;
        }, 150);
    }
</script>

</body>
</html>
